      - name: Inject Performance, BT and KSU Patches
        run: |
          cat << 'EOF' >> arch/arm64/configs/obsvg216_defconfig

          # =========================================================
          #  КЕРНЕЛ СУ НЕКСТ (ВСТРОЕННЫЙ РУТ-ДОСТУП)
          # =========================================================
          CONFIG_KSU=y

          # =========================================================
          #  1. МОНОЛИТНЫЙ BLUETOOTH & WI-FI (ВШИВАЕМ ПРЯМО В ЯДРО)
          # =========================================================
          CONFIG_WIRELESS=y
          CONFIG_WIRELESS_EXT=y
          CONFIG_WEXT_CORE=y
          CONFIG_WEXT_PROC=y
          CONFIG_WEXT_SPY=y
          CONFIG_WEXT_PRIV=y
          CONFIG_CFG80211=y
          CONFIG_CFG80211_DEFAULT_PS=y
          CONFIG_CFG80211_CRDA_SUPPORT=y
          CONFIG_MAC80211=y
          CONFIG_MAC80211_HAS_RC=y
          CONFIG_MAC80211_RC_MINSTRELS=y
          CONFIG_MAC80211_RC_MINSTRELS_HT=y
          CONFIG_MAC80211_RC_DEFAULT_MINSTRELS=y
          CONFIG_MAC80211_RC_DEFAULT="minstrel_ht"
          CONFIG_MAC80211_LEDS=y
          CONFIG_BT_BCM=y
          CONFIG_BT_QCA=y
          CONFIG_BT_HCIBTSDIO=y
          CONFIG_BT_HCIUART=y
          CONFIG_BT_HCIUART_SERDEV=y
          CONFIG_BT_HCIUART_H4=y
          CONFIG_BT_HCIUART_LL=y
          CONFIG_BT_HCIUART_BCM=y
          CONFIG_BT_HCIUART_QCA=y
          CONFIG_BT_AOSPEXT=y
          CONFIG_STREAM_PARSER=y
          CONFIG_FIB_RULES=y

          # =========================================================
          #  2. СКОРОСТЬ СИСТЕМЫ И ВОЗВРАТ ZRAM (ДЛЯ СТАТУСА ЗАГРУЗКИ)
          # =========================================================
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_SCHED_WALT=y
          CONFIG_SCHED_AUTOGROUP=y
          CONFIG_IOSCHED_BFQ=y
          CONFIG_DEFAULT_BFQ=y
          CONFIG_ZRAM=y
          CONFIG_ZRAM_WRITEBACK=y

          # =========================================================
          #  3. НИЗКАЯ ЗАДЕРЖКА И ОТЗЫВЧИВОСТЬ ИНТЕРФЕЙСА (LOW-LATENCY)
          # =========================================================
          CONFIG_PREEMPT=y
          # CONFIG_PREEMPT_NONE is not set
          # CONFIG_PREEMPT_VOLUNTARY is not set
          CONFIG_HZ_1000=y
          # CONFIG_HZ_300 is not set
          CONFIG_UNINLINE_SPIN_UNLOCK=y

          # =========================================================
          #  4. УДАЛЕНИЕ ОТЛАДОЧНОГО МУСОРА И ОТКЛЮЧЕНИЕ СТРОГИХ ОШИБОК
          # =========================================================
          # CONFIG_WERROR is not set
          # CONFIG_IKHEADERS is not set
          # CONFIG_SLUB_DEBUG is not set
          # CONFIG_SCHED_DEBUG is not set
          # CONFIG_SCHEDSTATS is not set
          # CONFIG_DEBUG_MISC is not set
          # CONFIG_PROVE_LOCKING is not set
          # CONFIG_LOCKDEP is not set
          # CONFIG_PANIC_ON_OOPS is not set
          EOF
